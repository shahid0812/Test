<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pachirisu Fix</title>
    <style>
        body { margin: 0; background: #1a1a1a; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; }
        canvas { position: absolute; top: 0; left: 0; }
        #status { position: relative; z-index: 10; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; text-align: center; border: 1px solid #444; }
    </style>
</head>
<body>

<div id="status">⏳ Loading Engines...</div>

<script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
<script src="https://cubism.live2d.com/sdk-web/bin/cubismcore.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0-beta.2/dist/index.min.js"></script>

<script>
    const statusDiv = document.getElementById('status');

    async function init() {
        // 1. Wait for everything to be ready
        if (typeof PIXI === 'undefined') {
            statusDiv.innerHTML = "❌ PixiJS failed. Check connection.";
            return;
        }

        statusDiv.innerHTML = "🔧 Checking Plugin...";
        
        // Sometimes the plugin takes a moment to register itself to PIXI
        let attempts = 0;
        while (!PIXI.live2d && attempts < 10) {
            await new Promise(r => setTimeout(r, 500));
            attempts++;
        }

        if (!PIXI.live2d || !PIXI.live2d.Live2DModel) {
            statusDiv.innerHTML = "❌ Plugin Error.<br>Please use a different browser or refresh.";
            return;
        }

        try {
            statusDiv.innerHTML = "📥 Loading Model...";
            
            const app = new PIXI.Application({
                view: document.createElement('canvas'),
                resizeTo: window,
                backgroundAlpha: 0,
                antialias: true
            });
            document.body.appendChild(app.view);

            // Use the direct URL to be 100% sure it finds the file
            const modelUrl = "pachirisu.model3.json";
            const model = await PIXI.live2d.Live2DModel.from(modelUrl);

            app.stage.addChild(model);

            // Positioning
            const scale = Math.min(window.innerWidth / model.width, window.innerHeight / model.height) * 0.8;
            model.scale.set(scale);
            model.anchor.set(0.5, 0.5);
            model.x = window.innerWidth / 2;
            model.y = window.innerHeight / 2;

            statusDiv.style.display = "none";

        } catch (e) {
            statusDiv.innerHTML = "❌ <b>File Error:</b><br>" + e.message;
            console.error(e);
        }
    }

    // Delay start slightly to let the browser breathe
    window.onload = () => setTimeout(init, 1000);
</script>

</body>
</html>
