<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pachirisu</title>
    <style>body { margin: 0; background: #111; }</style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/6.5.10/browser/pixi.min.js"></script>
    <script src="https://cubism.live2d.com/sdk-web/bin/cubismcore.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0-beta.2/dist/cubism4.min.js"></script>

    <script>
        window.onload = async () => {
            // Check if the bridge actually exists
            if (!window.PIXI || !PIXI.live2d) {
                document.body.innerHTML = "<div style='color:white;padding:20px;'>Browser blocked the plugin. Try Incognito mode or disable 'Data Saver'.</div>";
                return;
            }

            const app = new PIXI.Application({
                width: window.innerWidth,
                height: window.innerHeight,
                backgroundAlpha: 0
            });
            document.body.appendChild(app.view);

            try {
                const model = await PIXI.live2d.Live2DModel.from("pachirisu.model3.json");
                app.stage.addChild(model);
                
                // Position and Scale
                const s = Math.min(window.innerWidth/model.width, window.innerHeight/model.height) * 0.8;
                model.scale.set(s);
                model.anchor.set(0.5);
                model.position.set(window.innerWidth/2, window.innerHeight/2);
            } catch (e) {
                alert("File missing: " + e.message);
            }
        };
    </script>
</body>
</html>
