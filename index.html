<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Live2D Android Fix</title>
  <style>
    body { margin: 0; background: #111; overflow: hidden; }
  </style>
</head>
<body>

<!-- 1. Load PixiJS -->
<script src="https://jsdelivr.net"></script>
<!-- 2. Load Cubism 4 SDK (REALLY IMPORTANT) -->
<script src="https://live2d.com"></script>
<!-- 3. Load Pixi-Live2D-Display -->
<script src="https://jsdelivr.net"></script>

<script>
  (async function() {
    const app = new PIXI.Application({
      view: document.createElement('canvas'),
      resizeTo: window,
      backgroundAlpha: 0,
      antialias: true
    });
    document.body.appendChild(app.view);

    try {
      // Use the simplified name we set in the JSON earlier
      const model = await PIXI.live2d.Live2DModel.from("pachirisu.model3.json");

      app.stage.addChild(model);

      // Auto-scaling to fit your screen
      const scale = Math.min(window.innerWidth / model.width, window.innerHeight / model.height) * 0.9;
      model.scale.set(scale);
      model.anchor.set(0.5, 0.5);
      model.position.set(window.innerWidth / 2, window.innerHeight / 2);

    } catch (e) {
      console.error("Error:", e);
    }
  })();
</script>

</body>
</html>
