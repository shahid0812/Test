<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pachirisu Viewer</title>
  <style>
    body { margin: 0; background: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; color: white; font-family: sans-serif; }
    canvas { position: absolute; top: 0; left: 0; z-index: 1; }
    #msg { position: relative; z-index: 10; background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px; border: 1px solid #444; }
  </style>
</head>
<body>

<div id="msg">🚀 Starting...</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/6.5.10/browser/pixi.min.js"></script>
<script src="https://cubism.live2d.com/sdk-web/bin/cubismcore.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0-beta.2/dist/index.min.js"></script>

<script>
  const msg = document.getElementById('msg');

  async function init() {
    // Check if the engine loaded
    if (typeof PIXI === 'undefined' || typeof PIXI.live2d === 'undefined') {
      msg.innerHTML = "❌ Engine Error: Library blocked by browser.<br>Try using Chrome in Incognito mode.";
      return;
    }

    try {
      const app = new PIXI.Application({
        width: window.innerWidth,
        height: window.innerHeight,
        backgroundAlpha: 0,
        antialias: true,
        resolution: window.devicePixelRatio || 1,
        autoDensity: true
      });
      document.body.appendChild(app.view);

      msg.innerHTML = "📥 Fetching pachirisu.model3.json...";

      // Attempt to load the model
      const model = await PIXI.live2d.Live2DModel.from("pachirisu.model3.json");

      app.stage.addChild(model);

      // Simple center and scale
      const scale = Math.min(window.innerWidth / model.width, window.innerHeight / model.height) * 0.8;
      model.scale.set(scale);
      model.anchor.set(0.5, 0.5);
      model.x = window.innerWidth / 2;
      model.y = window.innerHeight / 2;

      msg.style.display = "none"; // Hide message on success

    } catch (err) {
      msg.innerHTML = "❌ <b>Model Load Failed:</b><br>" + err.message;
    }
  }

  // Wait for scripts to finish parsing
  window.onload = () => setTimeout(init, 1000);
</script>
</body>
</html>
